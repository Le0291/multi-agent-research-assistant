[phases.setup]
nixPkgs = ["python312", "chromium", "chromium-driver"]

# PLAYWRIGHT_BROWSERS_PATH must be set in BOTH the build phase (so playwright
# install puts the binary in /app/browsers) AND the start command (so the
# runtime process knows where to find it).  The [variables] section alone only
# applies during the build container — it is NOT passed through to the running
# process on Railway.
[variables]
PLAYWRIGHT_BROWSERS_PATH = "/app/browsers"

[phases.install]
cmds = [
  "pip install --upgrade pip",
  "pip install -r requirements.txt",
  "python -m spacy download en_core_web_sm",
  "playwright install --with-deps chromium"
]

[start]
# Prefix with PLAYWRIGHT_BROWSERS_PATH so the runtime process finds the same
# browser binary that was installed during the build phase.
# --server.fileWatcherType=none suppresses noisy torchvision ModuleNotFoundError.
cmd = "PLAYWRIGHT_BROWSERS_PATH=/app/browsers streamlit run app.py --server.port=$PORT --server.address=0.0.0.0 --server.headless=true --server.fileWatcherType=none"
